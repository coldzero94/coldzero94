name: Generate 3D Contribution Calendar

on:
  # Schedule automatic updates every 12 hours
  schedule:
    - cron: "0 */12 * * *"

  # Allow manual trigger
  workflow_dispatch:

  # Run on push to main
  push:
    branches:
      - main

jobs:
  isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          user: coldzero94
          template: classic
          filename: github-isocalendar.svg
          config_timezone: Asia/Seoul
          config_display: large

          # Isocalendar only — no base sections, no other plugins
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
