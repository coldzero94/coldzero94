<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" width="300" height="170" role="img" aria-label="cold-frame — local-first memory for AI agents: one SQLite file, offline, no API key. brew install cold-frame. Python.">
  <style>
    text { font: 12px ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    .name { font-size: 15px; font-weight: 600; fill: #e6edf3; }
