    .cmd  { font-size: 11.5px; fill: #7ee787; }
    .meta { font-size: 11.5px; fill: #8b949e; }
  </style>
  <rect x="0.5" y="0.5" width="299" height="169" rx="12" fill="#0d1117" stroke="#30363d"/>
