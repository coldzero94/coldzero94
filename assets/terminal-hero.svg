<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 344" width="840" height="344" role="img" aria-label="Terminal session: whoami — Chanyoung Lee, AI engineer building RAG, semantic search, and agent tooling. brew install coldzero94/coldframe/cold-frame. Status bar shows GitHub activity for the last year with a 30-day sparkline.">
  <style>
    .win { fill: #0d1117; stroke: #30363d; stroke-width: 1; }
    .bar { fill: #161b22; }
    .title { fill: #8b949e; font: 500 12px ui-monospace, 'SF Mono', Menlo, Consolas, monospace; text-anchor: middle; }
