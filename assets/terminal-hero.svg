    .st { font-size: 12.5px; }
    .n  { fill: #7ee787; font-weight: 600; }
    .cur { fill: #7ee787; animation: blink 1.1s steps(2, start) infinite; }

    .session { animation: session 20s linear infinite; }
    .t1 { animation: type1 20s linear infinite; }
    .t2 { animation: type2 20s linear infinite; }
    .t3 { animation: type3 20s linear infinite; }
    .f1 { animation: fade1 20s linear infinite; }
